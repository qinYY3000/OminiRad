model:
  arch: omnirad
  model_type: pretrain
  max_txt_len: 512
  end_sym: "</s>"
  prompt_template: '[INST] {} [/INST]'
  llama_model: "weights/llama-2-7b-chat-hf"
  ckpt: "weights/minigpt_med_pretrained.pth"   # MiniGPT-Med 预训练权重作为起点
  lora_r: 64
  lora_alpha: 16
  chat_template: True
  low_resource: False
  use_grad_checkpoint: True      # ★ 开启 ViT 梯度检查点，省显存
  use_grad_checkpoint_llm: True  # ★ 开启 LLaMA 梯度检查点，省显存（24G 必开）

  expand_vocab: ["<SEG>", "<BOX_S>", "<BOX_M>", "<BOX_L>", "<LOC>"]

  dense_encoder:
    name: "medsam_vit_b"      # default: MedSAM-finetuned SAM ViT-B
    weights: "weights/medsam_vit_b.pth"  # baseline fallback: weights/sam_vit_b_01ec64.pth

    freeze: True

    no_grad_forward: True

  mask_decoder:
    hidden_dim: 512
    out_dim: 256
    predict_uncertainty: True

  loc_heads:
    box_s: {in_dim: 4096, hidden_dim: 512, n_class: 64}
    box_m: {in_dim: 4096, hidden_dim: 512, n_class: 64}
    box_l: {in_dim: 4096, hidden_dim: 512, n_class: 64}
    loc: {in_dim: 4096, hidden_dim: 512, n_anatomy: 30}

# ============================================================================
# Training datasets
# ----------------------------------------------------------------------------
# Per-GPU batch_size — adjust based on your GPU memory.
# 24 GB → batch_size: 1
# `sample_ratio` implements task-balanced sampling (higher = more frequent).
# ============================================================================
datasets:
  indiana_cxr:
    batch_size: 1
    sample_ratio: 25
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 448
    text_processor:
      train:
        name: "blip_caption"

  radvqa:
    batch_size: 1
    sample_ratio: 8
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 448
    text_processor:
      train:
        name: "blip_caption"

  slake_vqa:
    batch_size: 1
    sample_ratio: 10
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 448
    text_processor:
      train:
        name: "blip_caption"

  grounding_SLAKE:
    batch_size: 1
    sample_ratio: 10
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 448
    text_processor:
      train:
        name: "blip_caption"

  group_breast_us:
    batch_size: 1
    sample_ratio: 17
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 448
    text_processor:
      train:
        name: "blip_caption"

  kvasir:
    batch_size: 1
    sample_ratio: 23
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 448
    text_processor:
      train:
        name: "blip_caption"

# ============================================================================
# Evaluation datasets (used for val/test during training)
# ============================================================================
evaluation_datasets:
  indiana_cxr:
    eval_file_path: data/annotations/indiana_test.json
    img_path: data/Chest X/images
    max_new_tokens: 300
    batch_size: 10

  radvqa:
    eval_file_path: data/annotations/vqa_test.json
    img_path: data/radvqa/imgs
    max_new_tokens: 300
    batch_size: 10

  slake_vqa:
    eval_file_path: data/annotations/VQA_test_SLAKE.json
    img_path: data/slake/imgs
    max_new_tokens: 300
    batch_size: 10

  rsna:
    eval_file_path: data/annotations/RSNA_test.json
    img_path: data/rsna/RSNA-bbox-1024
    max_new_tokens: 100
    batch_size: 10

  SLAKE:
    eval_file_path: data/annotations/grounding_test_SLAKE.json
    img_path: data/slake/imgs
    max_new_tokens: 100
    batch_size: 10

  group_breast_us:
    eval_file_path: data/annotations/group_breast_test.json
    img_path: data/group_breast
    anatomy: breast
    tasks: [report, segmentation, detection, refer, identify]
    batch_size: 4
    max_new_tokens: 200
    tasks_cfg:
      report:
        max_new_tokens: 300
        batch_size: 4
      segmentation:
        max_new_tokens: 80
        batch_size: 4
      detection:
        max_new_tokens: 100
        batch_size: 4
      refer:
        max_new_tokens: 80
        batch_size: 4
      identify:
        max_new_tokens: 60
        batch_size: 4

  kvasir:
    eval_file_path: data/annotations/kvasir_test.json
    img_path: data/kvasir
    anatomy: colon
    tasks: [segmentation, detection, refer, identify, vqa]
    batch_size: 4
    max_new_tokens: 120
    tasks_cfg:
      segmentation:
        max_new_tokens: 80
        batch_size: 4
      detection:
        max_new_tokens: 120
        batch_size: 4
      refer:
        max_new_tokens: 80
        batch_size: 4
      identify:
        max_new_tokens: 60
        batch_size: 4
      vqa:
        max_new_tokens: 20
        batch_size: 10

# ============================================================================
# Training schedule & runtime
# ============================================================================
run:
  task: omnirad_eval             # 使用 OmniRadTask，验证时跑 valid_step 计算指标
  runner: runner_base

  # Learning rate
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 5e-6
  min_lr: 5e-7
  warmup_lr: 1e-6
  warmup_steps: 1000
  weight_decay: 0.05
  grad_clip: 1.0

  # Schedule
  max_epoch: 30
  iters_per_epoch: 5000       # 每个 epoch 固定 1000 步（batch_size=1 时也合理）

  # Memory / speed
  amp: True                   # Mixed precision
  num_workers: 4
  seed: 42
  accum_grad_iters: 1

  # Device
  device: "cuda"
  world_size: 1               # 单卡: 1;  多卡: GPU数量
  dist_url: "env://"
  distributed: True

  # Checkpointing ★★★ 这里就是保存权重的关键配置 ★★★
  output_dir: "experiments/omnirad"
  resume_ckpt_path: null
  evaluate: False
  train_splits: ["train"]
  valid_splits: ["val"]
  max_keep_ckpts: 3

  # Logging
  wandb_log: False
  wandb_project: "omnirad"
  wandb_entity: null
  wandb_tags: ["omnirad", "llama2"]
  job_name: omnirad_finetune
